<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zensar - Jira SDLC</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --brass-dark: #5a3f22;
    --brass: #8a6535;
    --brass-light: #c89760;
    --shade-dark: #1a0f08;
    --shade: #2a1a10;
    --warm: #ffd27a;
    --warm-bright: #fff5e0;
    --warm-deep: #ff9a3c;
  }

  html, body {
    min-height: 100vh;
    background: #000;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    cursor: default;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    background: #000;
  }

  /* Pure black ambient wall */
  .wall {
    position: absolute;
    inset: 0;
    background: #000;
    transition: background 1.8s ease;
  }
  .scene.on .wall {
    background:
      radial-gradient(ellipse 50% 80% at 28% 45%, #1a0f06 0%, #0a0604 30%, #000 70%);
  }

  /* Subtle wall grain */
  .wall::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, rgba(255,180,80,0.015) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0 1px, transparent 1px 4px);
    opacity: 0.5;
  }

  /* Outer warm halo around lamp */
  .glow {
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 28% 42%,
      rgba(255, 200, 100, 0.32) 0%,
      rgba(255, 160, 60, 0.16) 18%,
      rgba(255, 110, 40, 0.05) 40%,
      transparent 60%);
    opacity: 0;
    transition: opacity 1.4s ease 0.1s;
    pointer-events: none;
  }
  .scene.on .glow { opacity: 1; }

  /* Light cone projecting down from lamp */
  .light-cone {
    position: absolute;
    top: 38%;
    left: 28%;
    transform: translateX(-50%);
    width: 600px;
    height: 70vh;
    background: linear-gradient(to bottom,
      rgba(255, 210, 130, 0.28) 0%,
      rgba(255, 180, 80, 0.14) 35%,
      rgba(255, 150, 60, 0.04) 70%,
      transparent 100%);
    clip-path: polygon(43% 0%, 57% 0%, 100% 100%, 0% 100%);
    opacity: 0;
    transition: opacity 1.4s ease 0.3s;
    pointer-events: none;
    filter: blur(1px);
    mix-blend-mode: screen;
  }
  .scene.on .light-cone { opacity: 1; }

  /* Inner core glow at bulb */
  .bulb-core {
    position: absolute;
    top: 37%;
    left: 28%;
    transform: translateX(-50%);
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255, 248, 220, 0.95) 0%,
      rgba(255, 210, 120, 0.7) 25%,
      rgba(255, 160, 60, 0.3) 50%,
      transparent 75%);
    opacity: 0;
    transition: opacity 0.5s ease 0.2s;
    filter: blur(3px);
    pointer-events: none;
  }
  .scene.on .bulb-core { opacity: 1; animation: flicker 5s ease-in-out infinite 1.5s; }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    47% { opacity: 0.94; }
    49% { opacity: 0.88; }
    51% { opacity: 0.95; }
    53% { opacity: 1; }
  }

  /* Lamp assembly - positioned on the LEFT side */
  .lamp {
    position: absolute;
    top: 0;
    left: 28%;
    transform: translateX(-50%);
    width: 280px;
    z-index: 5;
  }

  .cord {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 160px;
    background: linear-gradient(to right, #0a0604 0%, #2a1a10 50%, #0a0604 100%);
    border-radius: 2px;
  }

  .lamp-svg {
    position: absolute;
    top: 158px;
    left: 50%;
    transform: translateX(-50%);
    filter: drop-shadow(0 8px 20px rgba(0,0,0,0.9));
  }

  /* Pull chain */
  .chain {
    position: absolute;
    top: 290px;
    left: 50%;
    margin-left: -8px;
    width: 16px;
    height: 140px;
    cursor: grab;
    z-index: 20;
    transform-origin: 8px 0px;
    animation: sway 5s ease-in-out infinite;
    transition: filter 0.3s;
  }
  .chain:hover { filter: brightness(1.3); }
  .chain:active { cursor: grabbing; }

  @keyframes sway {
    0%, 100% { transform: rotate(-1.5deg); }
    50% { transform: rotate(1.5deg); }
  }

  .chain.pulled { animation: pull 0.7s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes pull {
    0% { transform: translateY(0) rotate(0); }
    35% { transform: translateY(22px) rotate(0); }
    100% { transform: translateY(0) rotate(0); }
  }

  /* Hint label - near the chain */
  .hint {
    position: absolute;
    top: 70%;
    left: 28%;
    transform: translateX(-50%);
    color: rgba(255, 210, 122, 0.5);
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    white-space: nowrap;
    animation: hintPulse 2.6s ease-in-out infinite;
    transition: opacity 0.6s;
    pointer-events: none;
    z-index: 15;
  }
  .hint::before, .hint::after {
    content: '';
    display: inline-block;
    width: 24px;
    height: 1px;
    background: rgba(255, 210, 122, 0.3);
    vertical-align: middle;
    margin: 0 14px;
  }
  .scene.on .hint { opacity: 0; }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.35; }
    50% { opacity: 0.75; }
  }

  /* Login form - positioned on the RIGHT side */
  .login-wrap {
    position: absolute;
    top: 50%;
    right: 6%;
    transform: translateY(-50%) translateX(40px);
    width: 92%;
    max-width: 400px;
    opacity: 0;
    transition: opacity 1.2s ease 0.7s, transform 1.2s ease 0.7s;
    z-index: 30;
    pointer-events: none;
  }
  .scene.on .login-wrap {
    opacity: 1;
    transform: translateY(-50%) translateX(0);
    pointer-events: auto;
  }

  .login-card {
    position: relative;
    background: linear-gradient(155deg,
      rgba(20, 13, 7, 0.85) 0%,
      rgba(8, 5, 2, 0.95) 100%);
    border: 1px solid rgba(200, 151, 96, 0.28);
    padding: 48px 40px 36px;
    backdrop-filter: blur(10px);
    box-shadow:
      0 30px 80px rgba(0, 0, 0, 0.85),
      0 0 60px rgba(255, 170, 70, 0.1),
      inset 0 1px 0 rgba(255, 210, 130, 0.08);
  }
  .login-card::before {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(200, 151, 96, 0.12);
    pointer-events: none;
  }

  .ornament {
    text-align: center;
    color: var(--brass-light);
    font-size: 14px;
    letter-spacing: 0.6em;
    margin-bottom: 8px;
    opacity: 0.7;
  }

  .login-title {
    color: var(--warm);
    font-family: 'Cormorant Garamond', serif;
    font-size: 34px;
    font-weight: 400;
    letter-spacing: 0.08em;
    text-align: center;
    margin-bottom: 4px;
    text-shadow: 0 0 20px rgba(255, 180, 80, 0.3);
  }
  .login-sub {
    color: rgba(255, 210, 122, 0.5);
    font-size: 12px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 34px;
  }

  .field {
    margin-bottom: 22px;
    position: relative;
  }
  .field label {
    display: block;
    color: rgba(200, 151, 96, 0.85);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 10px;
    font-weight: 500;
  }
  .field input {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid rgba(200, 151, 96, 0.3);
    padding: 8px 0 10px;
    color: var(--warm-bright);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    letter-spacing: 0.05em;
    outline: none;
    transition: border-color 0.4s;
  }
  .field input::placeholder {
    color: rgba(200, 151, 96, 0.25);
    font-style: italic;
  }
  .field input:focus {
    border-bottom-color: var(--warm);
  }
  .field .line {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 1px;
    background: var(--warm);
    transition: width 0.4s ease, left 0.4s ease;
  }
  .field input:focus ~ .line {
    width: 100%;
    left: 0;
  }

  .row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: -4px 0 24px;
    font-size: 11px;
  }
  .remember {
    display: flex;
    align-items: center;
    gap: 8px;
    color: rgba(200, 151, 96, 0.7);
    cursor: pointer;
    letter-spacing: 0.1em;
  }
  .remember input { display: none; }
  .remember .box {
    width: 13px;
    height: 13px;
    border: 1px solid rgba(200, 151, 96, 0.4);
    position: relative;
    transition: all 0.3s;
  }
  .remember input:checked + .box {
    background: var(--brass);
    border-color: var(--brass-light);
  }
  .remember input:checked + .box::after {
    content: '';
    position: absolute;
    left: 3px;
    top: 0px;
    width: 4px;
    height: 8px;
    border: solid #1a0f08;
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg);
  }
  .forgot {
    color: rgba(200, 151, 96, 0.7);
    text-decoration: none;
    letter-spacing: 0.1em;
    transition: color 0.3s;
  }
  .forgot:hover { color: var(--warm); }

  .login-btn {
    width: 100%;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--brass-light);
    color: var(--warm);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.4s;
    position: relative;
    overflow: hidden;
  }
  .login-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 210, 122, 0.2), transparent);
    transition: left 0.6s;
  }
  .login-btn:hover::before { left: 100%; }
  .login-btn:hover {
    background: rgba(200, 151, 96, 0.1);
    border-color: var(--warm);
    color: var(--warm-bright);
    box-shadow: 0 0 20px rgba(255, 180, 80, 0.25);
  }

  .signup {
    text-align: center;
    margin-top: 22px;
    color: rgba(200, 151, 96, 0.55);
    font-size: 11px;
    letter-spacing: 0.15em;
  }
  .signup a {
    color: var(--warm);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.3s;
  }
  .signup a:hover { border-bottom-color: var(--warm); }

  /* Welcome Message (After Login) */
  .welcome-msg {
    display: none;
    text-align: center;
    padding: 60px 20px;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .welcome-msg.show {
    opacity: 1;
  }
  .welcome-msg h2 {
    color: var(--warm-bright);
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 400;
    letter-spacing: 0.05em;
    text-shadow: 0 0 30px rgba(255, 210, 130, 0.6);
  }
  .welcome-msg p {
    color: var(--brass-light);
    font-size: 11px;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    margin-top: 15px;
  }

  /* Dust particles */
  .dust {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--warm-bright);
    border-radius: 50%;
    pointer-events: none;
    opacity: 0;
    box-shadow: 0 0 4px rgba(255, 210, 130, 0.8);
  }

  /* Brand label */
  .brand {
    position: absolute;
    top: 30px;
    left: 40px;
    color: rgba(200, 151, 96, 0.5);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    letter-spacing: 0.3em;
    z-index: 15;
    transition: color 1s;
  }
  .brand::first-letter { color: var(--warm); }
  .scene.on .brand { color: rgba(200, 151, 96, 0.8); }

  /* Divider line connecting lamp area to login area */
  .divider {
    position: absolute;
    top: 20%;
    bottom: 20%;
    left: 56%;
    width: 1px;
    background: linear-gradient(to bottom,
      transparent 0%,
      rgba(200, 151, 96, 0.15) 30%,
      rgba(200, 151, 96, 0.15) 70%,
      transparent 100%);
    opacity: 0;
    transition: opacity 1.4s ease 0.8s;
    z-index: 10;
  }
  .scene.on .divider { opacity: 1; }

  @media (max-width: 900px) {
    .lamp { left: 50%; }
    .glow { background: radial-gradient(circle at 50% 42%, rgba(255, 200, 100, 0.32) 0%, rgba(255, 160, 60, 0.16) 18%, transparent 60%); }
    .light-cone { left: 50%; }
    .bulb-core { left: 50%; }
    .hint { left: 50%; }
    .login-wrap {
      right: 50%;
      transform: translate(50%, -50%) translateY(40px);
      top: auto;
      bottom: 5%;
      max-width: 360px;
    }
    .scene.on .login-wrap {
      transform: translate(50%, 0);
    }
    .divider { display: none; }
  }
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="wall"></div>
  <div class="glow"></div>
  <div class="light-cone"></div>
  <div class="bulb-core"></div>
  <div class="divider"></div>

  <div class="brand">Zensar</div>

  <!-- Lamp assembly on the LEFT side -->
  <div class="lamp">
    <div class="cord"></div>
    <svg class="lamp-svg" width="280" height="170" viewBox="0 0 280 170">
      <defs>
        <linearGradient id="brassGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#3a2515"/>
          <stop offset="25%" stop-color="#8a6535"/>
          <stop offset="50%" stop-color="#d4a574"/>
          <stop offset="75%" stop-color="#8a6535"/>
          <stop offset="100%" stop-color="#3a2515"/>
        </linearGradient>
        <linearGradient id="shadeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#000000"/>
          <stop offset="50%" stop-color="#1a100a"/>
          <stop offset="100%" stop-color="#000000"/>
        </linearGradient>
        <linearGradient id="shadeInner" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#000"/>
          <stop offset="100%" stop-color="#0a0604"/>
        </linearGradient>
        <radialGradient id="bulbLit" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff8dc"/>
          <stop offset="40%" stop-color="#ffd27a"/>
          <stop offset="80%" stop-color="#ff9a3c"/>
          <stop offset="100%" stop-color="#8a4a15"/>
        </radialGradient>
        <radialGradient id="bulbDark" cx="40%" cy="40%" r="60%">
          <stop offset="0%" stop-color="#2a1a10"/>
          <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
      </defs>

      <!-- Ceiling fixture -->
      <ellipse cx="140" cy="6" rx="22" ry="4" fill="url(#brassGrad)"/>
      <rect x="118" y="0" width="44" height="8" fill="url(#brassGrad)"/>

      <!-- Lamp shade -->
      <path d="M 75 18 L 205 18 L 250 145 L 30 145 Z"
            fill="url(#shadeGrad)" stroke="#000" stroke-width="1"/>
      <path d="M 80 22 L 200 22 L 240 142 L 40 142 Z"
            fill="url(#shadeInner)"/>
      <path d="M 78 18 L 202 18" stroke="rgba(212, 165, 116, 0.4)" stroke-width="0.5" fill="none"/>

      <!-- Brass bottom rim -->
      <ellipse cx="140" cy="145" rx="110" ry="6" fill="url(#brassGrad)"/>
      <ellipse cx="140" cy="145" rx="110" ry="3" fill="#3a2515"/>
      <ellipse cx="140" cy="143" rx="108" ry="2" fill="rgba(212, 165, 116, 0.5)"/>

      <!-- Bulb socket -->
      <rect x="128" y="22" width="24" height="18" fill="#0a0604" stroke="#3a2515" stroke-width="0.5"/>
      <rect x="130" y="22" width="20" height="3" fill="url(#brassGrad)"/>

      <!-- Bulb -->
      <ellipse id="bulb" cx="140" cy="75" rx="16" ry="22" fill="url(#bulbDark)"/>
      <path id="filament" d="M 134 75 Q 137 65 140 75 Q 143 85 146 75"
            stroke="#3a2515" stroke-width="0.8" fill="none" opacity="0.6"/>
      <rect x="134" y="92" width="12" height="6" fill="url(#brassGrad)"/>
      <rect x="135" y="96" width="10" height="2" fill="#3a2515"/>
    </svg>

    <!-- Pull chain -->
    <div class="chain" id="chain">
      <svg width="16" height="140" viewBox="0 0 16 140">
        <defs>
          <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3a2515"/>
            <stop offset="50%" stop-color="#c89760"/>
            <stop offset="100%" stop-color="#3a2515"/>
          </linearGradient>
          <radialGradient id="knobGrad" cx="30%" cy="30%" r="70%">
            <stop offset="0%" stop-color="#f0d4a0"/>
            <stop offset="40%" stop-color="#c89760"/>
            <stop offset="100%" stop-color="#3a2515"/>
          </radialGradient>
        </defs>
        <g fill="url(#linkGrad)" stroke="#000" stroke-width="0.5">
          <ellipse cx="8" cy="6" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="17" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="28" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="39" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="50" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="61" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="72" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="83" rx="3.5" ry="4.5"/>
          <ellipse cx="8" cy="94" rx="3.5" ry="4.5"/>
        </g>
        <circle cx="8" cy="115" r="11" fill="url(#knobGrad)" stroke="#000" stroke-width="1"/>
        <circle cx="8" cy="115" r="7" fill="none" stroke="#3a2515" stroke-width="0.8"/>
        <circle cx="4" cy="111" r="2" fill="rgba(255, 240, 200, 0.6)"/>
        <line x1="8" y1="100" x2="8" y2="104" stroke="#3a2515" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <div class="hint">Pull the chain</div>

  <!-- Login form on the RIGHT side -->
  <div class="login-wrap">
    <div class="login-card" id="loginCard">
      <div id="formContent">
        <div class="ornament">✦</div>
        <h1 class="login-title">Greetings</h1>
        <p class="login-sub">Jira SDLC</p>

        <form id="loginForm">
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="user@zensar.com" autocomplete="email" required>
            <div class="line"></div>
          </div>

          <div class="field">
            <label>Password</label>
            <input type="password" id="password" placeholder="" autocomplete="current-password" required>
            <div class="line"></div>
          </div>

          <div class="row">
            <label class="remember">
              <input type="checkbox" id="remember">
              <span class="box"></span>
              <span>Remember me</span>
            </label>
            <a href="#" class="forgot">Forgot?</a>
          </div>

          <button type="submit" class="login-btn">Authenticate</button>

          <p class="signup">Need access? <a href="#">Contact admin</a></p>
        </form>
      </div>

      <!-- Welcome message displayed after login -->
      <div class="welcome-msg" id="welcomeMsg">
        <h2>Welcome to Jira SDLC</h2>
        <p>Authentication Successful</p>
      </div>
    </div>
  </div>
</div>

<script>
  const scene = document.getElementById('scene');
  const chain = document.getElementById('chain');
  const bulb = document.getElementById('bulb');
  const filament = document.getElementById('filament');
  const form = document.getElementById('loginForm');
  const formContent = document.getElementById('formContent');
  const welcomeMsg = document.getElementById('welcomeMsg');
  let isOn = false;
  let dustInterval = null;

  chain.addEventListener('click', toggleLamp);

  function toggleLamp() {
    chain.classList.add('pulled');
    setTimeout(() => chain.classList.remove('pulled'), 700);

    if (!isOn) {
      isOn = true;
      setTimeout(() => {
        scene.classList.add('on');
        bulb.setAttribute('fill', 'url(#bulbLit)');
        filament.setAttribute('stroke', '#fff8dc');
        filament.setAttribute('opacity', '0.9');
        startDust();
      }, 250);
    } else {
      isOn = false;
      scene.classList.remove('on');
      bulb.setAttribute('fill', 'url(#bulbDark)');
      filament.setAttribute('stroke', '#3a2515');
      filament.setAttribute('opacity', '0.6');
      stopDust();
    }
  }

  function startDust() {
    if (dustInterval) return;
    for (let i = 0; i < 25; i++) {
      setTimeout(() => spawnDust(), i * 80);
    }
    dustInterval = setInterval(spawnDust, 220);
  }

  function stopDust() {
    clearInterval(dustInterval);
    dustInterval = null;
  }

  function spawnDust() {
    const dust = document.createElement('div');
    dust.className = 'dust';

    const startX = 22 + Math.random() * 12;
    const startY = 38 + Math.random() * 8;
    const driftX = (Math.random() - 0.3) * 6;
    const driftY = 25 + Math.random() * 20;
    const duration = 6 + Math.random() * 6;
    const size = 1.5 + Math.random() * 2;

    dust.style.left = startX + '%';
    dust.style.top = startY + '%';
    dust.style.width = size + 'px';
    dust.style.height = size + 'px';

    scene.appendChild(dust);

    const anim = dust.animate([
      { transform: 'translate(0, 0)', opacity: 0 },
      { opacity: 0.9, offset: 0.15 },
      { opacity: 0.9, offset: 0.7 },
      { transform: `translate(${driftX}vw, ${driftY}vh)`, opacity: 0 }
    ], {
      duration: duration * 1000,
      easing: 'ease-in-out'
    });

    anim.onfinish = () => dust.remove();
  }

  // Handle form submission
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    
    if (!email || !pass) {
      // Shake button or simple inline feedback if fields are empty
      const btn = document.querySelector('.login-btn');
      btn.style.transition = 'transform 0.3s';
      btn.style.transform = 'translateX(0)';
      setTimeout(() => btn.style.transform = 'translateX(-8px)', 50);
      setTimeout(() => btn.style.transform = 'translateX(8px)', 150);
      setTimeout(() => btn.style.transform = 'translateX(0)', 250);
      return;
    }

    // Fade out the form content
    formContent.style.transition = 'opacity 0.6s ease';
    formContent.style.opacity = '0';
    
    // After fade out, hide form and show welcome message
    setTimeout(() => {
      formContent.style.display = 'none';
      welcomeMsg.style.display = 'block';
      // Trigger fade in for welcome message
      setTimeout(() => welcomeMsg.classList.add('show'), 50);
    }, 600);
  });

  // Allow pulling the chain with keyboard (accessibility)
  chain.setAttribute('tabindex', '0');
  chain.setAttribute('role', 'button');
  chain.setAttribute('aria-label', 'Pull lamp chain to turn on light');
  chain.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      toggleLamp();
    }
  });
</script>
</body>
</html>
